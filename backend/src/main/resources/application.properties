spring.datasource.url=jdbc:postgresql://localhost:5432/makewebsite_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway schema migration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# Spring Mail (Gmail SMTP - App Password required)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=benarousfiras011@gmail.com
spring.mail.password=${GMAIL_APP_PASSWORD}
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.properties.mail.debug=true
spring.mail.properties.mail.debug.auth=false
spring.mail.default-encoding=UTF-8

# Custom sender name shown in inbox
app.mail.from-name=MakeWebsite
app.public-url=${APP_PUBLIC_URL:https://scraggly-unmasked-glutinous.ngrok-free.app}

server.port=8080

jwt.secret=${JWT_SECRET:}
jwt.access-expiration=900000
jwt.refresh-expiration=604800000

openai.api-key=YOUR_OPENAI_API_KEY
openai.model=gpt-4o

telegram.bot-token=YOUR_TELEGRAM_BOT_TOKEN

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

upload.path=./uploads/

logging.level.io.makewebsite=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.servlet.mvc.method.annotation=TRACE
