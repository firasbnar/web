<!-- ═══════════════════════════════════════════════
     FLOATING 3D AI CHATBOT
     ═══════════════════════════════════════════ -->

<style>
  /* ── ORB BUTTON ── */
  .chat-orb-wrapper {
    position: fixed;
    bottom: 28px;
    right: 28px;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  /* Tooltip bubble above orb */
  .chat-orb-tooltip {
    background: #1a1a2e;
    color: #fff;
    font-family: var(--font);
    font-size: 0.8125rem;
    font-weight: 500;
    padding: 8px 14px;
    border-radius: 20px;
    white-space: nowrap;
    box-shadow: 0 4px 20px rgba(0,0,0,0.25);
    opacity: 1;
    transform: translateY(0);
    transition: all 0.3s ease;
    pointer-events: none;
    position: relative;
  }
  .chat-orb-tooltip::after {
    content: '';
    position: absolute;
    bottom: -6px;
    left: 50%;
    transform: translateX(-50%);
    border: 6px solid transparent;
    border-top-color: #1a1a2e;
    border-bottom: none;
  }
  .chat-orb-tooltip.hidden {
    opacity: 0;
    transform: translateY(6px);
    pointer-events: none;
  }

  /* The 3D glowing orb */
  .chat-orb {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    cursor: pointer;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;

    /* 3D sphere effect using layered box-shadows + radial gradient */
    background:
      radial-gradient(circle at 35% 30%,
        rgba(255,255,255,0.55) 0%,
        rgba(180,100,255,0.7)  30%,
        rgba(90,0,180,0.95)    65%,
        rgba(40,0,80,1)        100%
      );

    box-shadow:
      /* outer glow */
      0 0 0 2px rgba(180,100,255,0.3),
      0 0 20px rgba(150,50,255,0.5),
      0 0 45px rgba(120,0,255,0.35),
      0 0 80px rgba(100,0,200,0.2),
      /* inner depth */
      inset 0 -8px 20px rgba(0,0,0,0.5),
      inset 0 8px 16px rgba(255,255,255,0.15);

    animation: orbFloat 3s ease-in-out infinite,
               orbPulse 2.5s ease-in-out infinite;

    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  .chat-orb:hover {
    transform: scale(1.1) translateY(-3px);
    box-shadow:
      0 0 0 3px rgba(180,100,255,0.5),
      0 0 30px rgba(150,50,255,0.7),
      0 0 60px rgba(120,0,255,0.5),
      0 0 100px rgba(100,0,200,0.3),
      inset 0 -8px 20px rgba(0,0,0,0.5),
      inset 0 8px 16px rgba(255,255,255,0.2);
  }

  /* Shine highlight on top of orb */
  .chat-orb::before {
    content: '';
    position: absolute;
    top: 10px;
    left: 14px;
    width: 22px;
    height: 14px;
    background: radial-gradient(ellipse,
      rgba(255,255,255,0.7) 0%,
      rgba(255,255,255,0) 100%
    );
    border-radius: 50%;
    transform: rotate(-25deg);
    pointer-events: none;
  }

  /* Ring ripple around orb */
  .chat-orb::after {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    border: 2px solid rgba(180,100,255,0.4);
    animation: orbRing 2.5s ease-out infinite;
    pointer-events: none;
  }

  /* AI icon inside orb */
  .chat-orb-icon {
    font-size: 26px;
    color: rgba(255,255,255,0.92);
    line-height: 1;
    text-shadow: 0 0 12px rgba(255,255,255,0.6);
    pointer-events: none;
    z-index: 1;
    position: relative;
  }

  /* Floating animation */
  @keyframes orbFloat {
    0%, 100% { transform: translateY(0px); }
    50%       { transform: translateY(-8px); }
  }
  @keyframes orbPulse {
    0%, 100% {
      box-shadow:
        0 0 0 2px rgba(180,100,255,0.3),
        0 0 20px rgba(150,50,255,0.5),
        0 0 45px rgba(120,0,255,0.35),
        0 0 80px rgba(100,0,200,0.2),
        inset 0 -8px 20px rgba(0,0,0,0.5),
        inset 0 8px 16px rgba(255,255,255,0.15);
    }
    50% {
      box-shadow:
        0 0 0 3px rgba(200,130,255,0.5),
        0 0 30px rgba(170,80,255,0.7),
        0 0 60px rgba(140,20,255,0.5),
        0 0 100px rgba(120,0,220,0.3),
        inset 0 -8px 20px rgba(0,0,0,0.5),
        inset 0 8px 20px rgba(255,255,255,0.2);
    }
  }
  @keyframes orbRing {
    0%   { transform: scale(1);   opacity: 0.6; }
    100% { transform: scale(1.7); opacity: 0;   }
  }

  /* Particle dots orbiting the orb */
  .orb-particle {
    position: absolute;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: rgba(200,150,255,0.8);
    pointer-events: none;
  }
  .orb-particle:nth-child(1) { animation: orbit1 4s linear infinite; }
  .orb-particle:nth-child(2) { animation: orbit2 5s linear infinite; }
  .orb-particle:nth-child(3) { animation: orbit3 3.5s linear infinite; }

  @keyframes orbit1 {
    from { transform: rotate(0deg)   translateX(38px) rotate(0deg); }
    to   { transform: rotate(360deg) translateX(38px) rotate(-360deg); }
  }
  @keyframes orbit2 {
    from { transform: rotate(120deg) translateX(42px) rotate(-120deg); }
    to   { transform: rotate(480deg) translateX(42px) rotate(-480deg); }
  }
  @keyframes orbit3 {
    from { transform: rotate(240deg) translateX(35px) rotate(-240deg); }
    to   { transform: rotate(600deg) translateX(35px) rotate(-600deg); }
  }

  /* ── CHAT PANEL ── */
  .chat-panel {
    position: fixed;
    bottom: 108px;
    right: 28px;
    width: 370px;
    max-height: 540px;
    background: #0f0f1a;
    border-radius: 20px;
    border: 1px solid rgba(180,100,255,0.3);
    box-shadow:
      0 0 0 1px rgba(180,100,255,0.1),
      0 20px 60px rgba(0,0,0,0.6),
      0 0 40px rgba(120,0,255,0.15);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    z-index: 9998;
    transform: scale(0.85) translateY(20px);
    transform-origin: bottom right;
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .chat-panel.open {
    transform: scale(1) translateY(0);
    opacity: 1;
    pointer-events: all;
  }

  /* Panel header */
  .chat-panel-header {
    padding: 16px 18px;
    background: linear-gradient(135deg,
      rgba(100,0,200,0.8) 0%,
      rgba(60,0,140,0.9)  100%
    );
    border-bottom: 1px solid rgba(180,100,255,0.2);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .chat-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%,
      rgba(255,255,255,0.5) 0%,
      rgba(160,80,255,0.8)  40%,
      rgba(80,0,160,1)      100%
    );
    box-shadow: 0 0 12px rgba(180,100,255,0.6);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }
  .chat-header-info { flex: 1; }
  .chat-header-name {
    font-size: 0.9375rem;
    font-weight: 700;
    color: #fff;
    font-family: var(--font);
  }
  .chat-header-status {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.75rem;
    color: rgba(200,180,255,0.8);
    font-family: var(--font);
  }
  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #4ade80;
    box-shadow: 0 0 6px #4ade80;
    animation: statusPulse 2s ease-in-out infinite;
  }
  @keyframes statusPulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.4; }
  }
  .chat-close-btn {
    background: rgba(255,255,255,0.1);
    border: none;
    color: rgba(255,255,255,0.7);
    width: 28px;
    height: 28px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    transition: background 0.2s;
    font-family: var(--font);
  }
  .chat-close-btn:hover { background: rgba(255,255,255,0.2); color: #fff; }

  /* Messages area */
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scrollbar-width: thin;
    scrollbar-color: rgba(180,100,255,0.3) transparent;
  }
  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-thumb {
    background: rgba(180,100,255,0.3);
    border-radius: 4px;
  }

  /* Message bubbles */
  .chat-msg {
    display: flex;
    gap: 8px;
    align-items: flex-end;
    max-width: 88%;
    animation: msgIn 0.3s ease;
  }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .chat-msg.bot  { align-self: flex-start; }
  .chat-msg.user { align-self: flex-end; flex-direction: row-reverse; }

  .msg-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%,
      rgba(255,255,255,0.4) 0%,
      rgba(140,60,240,0.8)  40%,
      rgba(70,0,140,1)      100%
    );
    box-shadow: 0 0 8px rgba(180,100,255,0.4);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
  }

  .msg-bubble {
    padding: 10px 14px;
    border-radius: 16px;
    font-family: var(--font);
    font-size: 0.875rem;
    line-height: 1.5;
    max-width: 100%;
    word-break: break-word;
  }
  .chat-msg.bot .msg-bubble {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(180,100,255,0.2);
    color: rgba(255,255,255,0.9);
    border-bottom-left-radius: 4px;
  }
  .chat-msg.user .msg-bubble {
    background: linear-gradient(135deg, #7c3aed, #5b21b6);
    color: #fff;
    border-bottom-right-radius: 4px;
    box-shadow: 0 4px 12px rgba(124,58,237,0.4);
  }

  /* Typing indicator */
  .typing-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    align-self: flex-start;
  }
  .typing-dots {
    display: flex;
    gap: 4px;
    padding: 10px 14px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(180,100,255,0.2);
    border-radius: 16px;
    border-bottom-left-radius: 4px;
  }
  .typing-dots span {
    width: 6px;
    height: 6px;
    background: rgba(180,100,255,0.7);
    border-radius: 50%;
    animation: typingDot 1.2s ease-in-out infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typingDot {
    0%, 60%, 100% { transform: translateY(0);   opacity: 0.4; }
    30%           { transform: translateY(-6px); opacity: 1;   }
  }

  /* Quick reply chips */
  .quick-replies {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 0 16px 8px;
  }
  .quick-chip {
    padding: 6px 12px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(180,100,255,0.3);
    border-radius: 20px;
    font-family: var(--font);
    font-size: 0.75rem;
    color: rgba(200,180,255,0.9);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .quick-chip:hover {
    background: rgba(180,100,255,0.2);
    border-color: rgba(180,100,255,0.6);
    color: #fff;
  }

  /* Input area */
  .chat-input-row {
    padding: 12px 14px;
    background: rgba(255,255,255,0.04);
    border-top: 1px solid rgba(180,100,255,0.15);
    display: flex;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
  }
  .chat-input {
    flex: 1;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(180,100,255,0.2);
    border-radius: 24px;
    padding: 10px 16px;
    font-family: var(--font);
    font-size: 0.875rem;
    color: #fff;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .chat-input::placeholder { color: rgba(255,255,255,0.3); }
  .chat-input:focus {
    border-color: rgba(180,100,255,0.6);
    box-shadow: 0 0 0 3px rgba(180,100,255,0.1);
  }
  .chat-send-btn {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: linear-gradient(135deg, #7c3aed, #5b21b6);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    color: #fff;
    flex-shrink: 0;
    transition: all 0.2s;
    box-shadow: 0 4px 12px rgba(124,58,237,0.4);
  }
  .chat-send-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 6px 20px rgba(124,58,237,0.6);
  }
  .chat-send-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  /* Powered by footer */
  .chat-powered {
    text-align: center;
    padding: 6px;
    font-family: var(--font);
    font-size: 0.6875rem;
    color: rgba(255,255,255,0.2);
    border-top: 1px solid rgba(255,255,255,0.05);
    flex-shrink: 0;
  }

  /* Mobile */
  @media (max-width: 480px) {
    .chat-panel {
      width: calc(100vw - 24px);
      right: 12px;
      bottom: 96px;
      max-height: 70vh;
    }
    .chat-orb-wrapper { right: 16px; bottom: 20px; }
  }
</style>

<!-- ORB BUTTON -->
<div class="chat-orb-wrapper" id="chatOrbWrapper">
  <div class="chat-orb-tooltip" id="chatTooltip">
    Besoin d'aide ?
  </div>
  <div class="chat-orb" id="chatOrb" onclick="toggleChatPanel()" role="button"
      aria-label="Ouvrir le chat" tabindex="0">
    <div class="orb-particle"></div>
    <div class="orb-particle"></div>
    <div class="orb-particle"></div>
    <span class="chat-orb-icon">✦</span>
  </div>
</div>

<!-- CHAT PANEL -->
<div class="chat-panel" id="chatPanel">

  <!-- Header -->
  <div class="chat-panel-header">
    <div class="chat-avatar">✦</div>
    <div class="chat-header-info">
      <div class="chat-header-name">Assistant {{BOUTIQUE_NAME}}</div>
      <div class="chat-header-status">
        <span class="status-dot"></span>
        En ligne · Respond instantanement
      </div>
    </div>
    <button class="chat-close-btn" onclick="toggleChatPanel()" aria-label="Fermer">✕</button>
  </div>

  <!-- Messages -->
  <div class="chat-messages" id="chatMessages"></div>

  <!-- Quick replies -->
  <div class="quick-replies" id="quickReplies">
    <button class="quick-chip" onclick="sendQuick(this)"> Voir les produits</button>
    <button class="quick-chip" onclick="sendQuick(this)"> Livraison</button>
    <button class="quick-chip" onclick="sendQuick(this)"> Paiement</button>
    <button class="quick-chip" onclick="sendQuick(this)"> Contact</button>
  </div>

  <!-- Input -->
  <div class="chat-input-row">
    <input class="chat-input" id="chatInput" type="text"
      placeholder="Posez votre question..."
      onkeydown="if(event.key==='Enter')sendChatMessage()"
      maxlength="500">
    <button class="chat-send-btn" id="chatSendBtn"
      onclick="sendChatMessage()" aria-label="Envoyer">

    </button>
  </div>
  <div class="chat-powered">Propulsé par MakeWebsite.io AI</div>
</div>

<script>
(function() {

  // ── STORE CONTEXT (injected by StoreGeneratorService) ──
  const STORE_CONTEXT = {
    name:          '{{BOUTIQUE_NAME}}',
    description:   '{{BOUTIQUE_DESCRIPTION}}',
    currency:      '{{CURRENCY_SYMBOL}}',
    deliveryFees:  {{DELIVERY_FEES}},
    cashOnDelivery: {{CASH_ON_DELIVERY_BOOL}},
    konnectActive:  {{KONNECT_ACTIVE_BOOL}},
    d17Active:      {{D17_ACTIVE_BOOL}},
    whatsapp:      '{{WHATSAPP_NUMBER}}',
    products: {{PRODUCTS_JSON}},
    categories: {{CATEGORIES_JSON}},
    language:   '{{STORE_LANGUAGE}}',
    boutiqueId: '{{BOUTIQUE_ID}}',
  };

  // ── STATE ──
  let chatOpen   = false;
  let isLoading  = false;
  let msgHistory = [];

  // ── SYSTEM PROMPT ──
  function buildSystemPrompt() {
    const products = STORE_CONTEXT.products
      .slice(0, 30)
      .map(p => '- ' + p.name + ': ' + STORE_CONTEXT.currency + p.price + (p.comparePrice ? ' (etait ' + STORE_CONTEXT.currency + p.comparePrice + ')' : '') + (p.category ? ' [' + p.category + ']' : ''))
      .join('\n');

    const cats = STORE_CONTEXT.categories.map(c => c.name).join(', ');

    const paymentMethods = [
      STORE_CONTEXT.cashOnDelivery ? 'Paiement a la livraison (Cash on Delivery)' : null,
      STORE_CONTEXT.konnectActive  ? 'Konnect (paiement par carte bancaire en ligne)' : null,
      STORE_CONTEXT.d17Active      ? 'D17 (paiement mobile)' : null,
    ].filter(Boolean).join(', ');

    return 'Tu es l\'assistant virtuel de la boutique en ligne "' + STORE_CONTEXT.name + '".\n' +
      'Tu reponds uniquement en francais (ou en arabe si le client ecrit en arabe).\n' +
      'Tu es serviable, chaleureux, concis et professionnel.\n\n' +
      'INFORMATIONS SUR LA BOUTIQUE :\n' +
      '- Nom : ' + STORE_CONTEXT.name + '\n' +
      '- Description : ' + (STORE_CONTEXT.description || 'Boutique en ligne tunisienne') + '\n' +
      '- Frais de livraison : ' + STORE_CONTEXT.currency + STORE_CONTEXT.deliveryFees + '\n' +
      '- Delai de livraison : 24 a 48 heures partout en Tunisie\n' +
      '- Methodes de paiement : ' + (paymentMethods || 'Paiement a la livraison') + '\n' +
      (STORE_CONTEXT.whatsapp ? '- WhatsApp : ' + STORE_CONTEXT.whatsapp + '\n' : '') +
      '\nCATEGORIES DISPONIBLES :\n' +
      (cats || 'Non specifiees') + '\n\n' +
      'PRODUITS DISPONIBLES :\n' +
      (products || 'Aucun produit liste') + '\n\n' +
      'REGLES IMPORTANTES :\n' +
      '1. Si un client demande un produit, donne le prix exact et propose d\'ajouter au panier.\n' +
      '2. Pour les questions de livraison, explique les frais et le delai.\n' +
      '3. Pour le paiement, liste les methodes disponibles.\n' +
      '4. Si tu ne sais pas quelque chose, dis-le honnetement.\n' +
      '5. Ne mentionne jamais d\'autres boutiques ou concurrents.\n' +
      '6. Reponds en 1-3 phrases maximum sauf si une liste est necessaire.\n' +
      '7. Si le client veut commander, encourage-le a utiliser le panier sur la page.';
  }

  // ── TOGGLE PANEL ──
  window.toggleChatPanel = function() {
    chatOpen = !chatOpen;
    var panel   = document.getElementById('chatPanel');
    var tooltip = document.getElementById('chatTooltip');
    panel.classList.toggle('open', chatOpen);
    tooltip.classList.toggle('hidden', chatOpen);

    if (chatOpen && msgHistory.length === 0) {
      setTimeout(function() {
        addBotMessage('Bonjour ! Bienvenue chez **' + STORE_CONTEXT.name + '**. Comment puis-je vous aider aujourd\'hui ?');
      }, 300);
    }
    if (chatOpen) {
      setTimeout(function() { document.getElementById('chatInput').focus(); }, 400);
    }
  };

  // ── QUICK REPLY ──
  window.sendQuick = function(btn) {
    var text = btn.textContent.replace(/^[^\w]+/, '').trim();
    document.getElementById('quickReplies').style.display = 'none';
    processUserMessage(text);
  };

  // ── SEND MESSAGE ──
  window.sendChatMessage = function() {
    var input = document.getElementById('chatInput');
    var text  = input.value.trim();
    if (!text || isLoading) return;
    input.value = '';
    document.getElementById('quickReplies').style.display = 'none';
    processUserMessage(text);
  };

  function processUserMessage(text) {
    addUserMessage(text);
    msgHistory.push({ role: 'user', content: text });
    showTyping();
    callClaudeAPI();
  }

  // ── CALL CLAUDE API ──
  async function callClaudeAPI() {
    isLoading = true;
    document.getElementById('chatSendBtn').disabled = true;

    var messages = msgHistory.slice(-10).map(function(m) {
      return { role: m.role, content: m.content };
    });

    try {
      var res = await fetch('/api/public/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          boutiqueId: STORE_CONTEXT.boutiqueId,
          messages: messages,
          systemPrompt: buildSystemPrompt(),
        }),
      });

      var data = await res.json();
      hideTyping();

      var reply = data.content
        ? (data.content[0] ? data.content[0].text : null)
        : null;
      reply = reply || data.reply || "Desole, je n'ai pas pu obtenir une reponse. Reessayez.";

      msgHistory.push({ role: 'assistant', content: reply });
      addBotMessage(reply);

    } catch (err) {
      hideTyping();
      addBotMessage("Erreur de connexion. Veuillez reessayer.");
      console.error('[Chatbot]', err);
    } finally {
      isLoading = false;
      document.getElementById('chatSendBtn').disabled = false;
    }
  }

  // ── MESSAGE RENDERING ──
  function addUserMessage(text) {
    var msgs = document.getElementById('chatMessages');
    var div  = document.createElement('div');
    div.className = 'chat-msg user';
    div.innerHTML = '<div class="msg-bubble">' + escHtml(text) + '</div>';
    msgs.appendChild(div);
    scrollBottom();
  }

  function addBotMessage(text) {
    var msgs = document.getElementById('chatMessages');
    var div  = document.createElement('div');
    div.className = 'chat-msg bot';
    var rendered = escHtml(text)
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n/g, '<br>');
    div.innerHTML = '<div class="msg-avatar">*</div><div class="msg-bubble">' + rendered + '</div>';
    msgs.appendChild(div);
    scrollBottom();
  }

  function showTyping() {
    var msgs = document.getElementById('chatMessages');
    var div  = document.createElement('div');
    div.className = 'typing-indicator';
    div.id = 'typingIndicator';
    div.innerHTML = '<div class="msg-avatar">*</div><div class="typing-dots"><span></span><span></span><span></span></div>';
    msgs.appendChild(div);
    scrollBottom();
  }

  function hideTyping() {
    var el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  function scrollBottom() {
    var msgs = document.getElementById('chatMessages');
    msgs.scrollTop = msgs.scrollHeight;
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── AUTO-HIDE TOOLTIP after 5s ──
  setTimeout(function() {
    var el = document.getElementById('chatTooltip');
    if (el) el.classList.add('hidden');
  }, 5000);

  // ── Keyboard support on orb ──
  document.getElementById('chatOrb').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' || e.key === ' ') toggleChatPanel();
  });

})();
</script>
